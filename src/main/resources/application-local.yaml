# 本地开发 profile：IDEA 手动启动 SpringBoot 时配合 Docker 中间件使用
# 激活方式：IDEA 启动配置加 VM option -> -Dspring.profiles.active=local
# 端口沿用 application.yaml（3306/6379/5672），仅把 Docker 服务名改成本机 localhost
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hmdp?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
  data:
    redis:
      host: localhost
  rabbitmq:
    host: localhost
