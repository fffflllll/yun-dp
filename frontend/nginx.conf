server {
    listen       80;
    server_name  localhost;

    # 站点根目录（镜像内）
    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # 前端静态资源（html / css / js / imgs 都是相对路径，直接托管即可）
    location / {
        # 前端文件随镜像更新，浏览器必须重新校验，避免继续执行旧接口路径。
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    # 接口反向代理
    # 后端在宿主机用 IDEA 启动，Docker 容器内通过 host.docker.internal 访问宿主机。
    # （Docker Desktop for Mac/Windows 内置此域名；Linux 需给 frontend 加 extra_hosts: host.docker.internal:host-gateway）
    resolver 127.0.0.11 ipv6=off valid=30s;

    location /api {
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_set_header Connection '';
        add_header Cache-Control no-cache always;
        set $meetmate_backend host.docker.internal;
        rewrite /api(/.*) $1 break;
        proxy_pass_request_headers on;
        proxy_next_upstream error timeout;
        proxy_pass http://$meetmate_backend:8081;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
